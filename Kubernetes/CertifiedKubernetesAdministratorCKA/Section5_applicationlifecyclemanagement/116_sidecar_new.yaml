apiVersion: v1
kind: Pod
metadata:
  name: nginx-with-log-sidecar
spec:
  restartPolicy: Always
  volumes:
    - name: nginx-logs
      emptyDir: {}
  initContainers:
    - name: log-sidecar
      image: busybox:1.36
      restartPolicy: Always
      command: ["tail", "-F", "/logs/access.log"]
      volumeMounts:
        - name: nginx-logs
          mountPath: /logs
  containers:
    - name: nginx
      image: nginx:1.27-alpine
      ports:
        - containerPort: 80
      volumeMounts:
        - name: nginx-logs
          mountPath: /var/log/nginx