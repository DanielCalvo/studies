apiVersion: v1
kind: Pod
metadata:
  name: mypod-app
  labels:
    app: myapp
spec:
  containers:
    - name: myapp-container
      image: busybox:1.28
      command: ["sh", "-c", "echo 'The app is running!'; sleep 3600"]
  initContainers:
    - name: init-myservice
      image: busybox
      command: ["sh", "-c", "echo 'Initialising before the main container starts'; sleep 5"]
