global:
  scrape_interval: 10s
  evaluation_interval: 10s

alerting:
  alertmanagers:
  - static_configs:
    - targets:
      - alertmanager:9093

rule_files:
- rules.yml

scrape_configs:
- job_name: metrics_app
  static_configs:
  - targets:
    - metrics_app:8000
- job_name: pushgateway
  honor_labels: true
  static_configs:
  - targets:
    - pushgateway:9091
- job_name: prometheus
  static_configs:
  - targets:
    - localhost:9090
- job_name: node
  static_configs:
    - targets:
      - 192.168.1.112:9100 #node exporter on one of my machines
- job_name: node2
  static_configs:
    - targets:
      - 192.168.1.113:9100 #fictinal machine just to alert
