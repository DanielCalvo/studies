apiVersion: v1
kind: Service
metadata:
  name: image-resizer-api
  namespace: image-resizer
  labels:
    app.kubernetes.io/name: image-resizer-api
  annotations:
    metallb.io/loadBalancerIPs: 192.168.1.222
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: image-resizer-api
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: http
